<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dog head silhouette with paw -->
  <circle cx="50" cy="50" r="48" fill="#ad0d13"/>
  <!-- Dog face -->
  <ellipse cx="50" cy="52" rx="28" ry="26" fill="#fff"/>
  <!-- Left ear -->
  <ellipse cx="28" cy="32" rx="12" ry="18" fill="#fff" transform="rotate(-20 28 32)"/>
  <!-- Right ear -->
  <ellipse cx="72" cy="32" rx="12" ry="18" fill="#fff" transform="rotate(20 72 32)"/>
  <!-- Left eye -->
  <circle cx="40" cy="48" r="5" fill="#2b2b2b"/>
  <!-- Right eye -->
  <circle cx="60" cy="48" r="5" fill="#2b2b2b"/>
  <!-- Nose -->
  <ellipse cx="50" cy="62" rx="8" ry="6" fill="#2b2b2b"/>
  <!-- Tongue -->
  <ellipse cx="50" cy="72" rx="5" ry="6" fill="#e57373"/>
</svg>
